<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四個個位數加法練習</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            font-size: 16px;
            color: #666;
        }
        .score-board span {
            font-weight: bold;
        }
        .score { color: #2ecc71; }
        .total { color: #3498db; }
        .question-box {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }
        input[type="number"] {
            font-size: 24px;
            width: 120px;
            text-align: center;
            padding: 8px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            border-color: #3498db;
        }
        /* 隱藏 HTML5 數字輸入框的上下箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        button {
            font-size: 18px;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s;
            width: 100%;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            min-height: 30px;
        }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>加法大挑戰 (4個個位數)</h1>
    
    <div class="score-board">
        <div>答對題數: <span id="score" class="score">0</span></div>
        <div>總答題數: <span id="total" class="total">0</span></div>
    </div>

    <div class="question-box" id="question">正在載入題目...</div>
    
    <input type="number" id="answer" placeholder="答案" autofocus autocomplete="off">
    
    <button id="btn" onclick="checkAnswer()">送出答案</button>
    
    <div class="result" id="result"></div>
</div>

<script>
    let num1, num2, num3, num4, correctAnswer;
    let scoreCount = 0;
    let totalCount = 0;
    let isAnswered = false; // 用來判斷按鈕當前功能是「檢查」還是「下一題」

    const questionEl = document.getElementById('question');
    const answerInput = document.getElementById('answer');
    const btnEl = document.getElementById('btn');
    const resultEl = document.getElementById('result');
    const scoreEl = document.getElementById('score');
    const totalEl = document.getElementById('total');

    // 生成隨機個位數 (1~9)
    function getRandomDigit() {
        return Math.floor(Math.random() * 9) + 1;
    }

    // 產生新題目
    function generateQuestion() {
        num1 = getRandomDigit();
        num2 = getRandomDigit();
        num3 = getRandomDigit();
        num4 = getRandomDigit();
        correctAnswer = num1 + num2 + num3 + num4;

        questionEl.textContent = `${num1} + ${num2} + ${num3} + ${num4} = ?`;
        answerInput.value = '';
        resultEl.textContent = '';
        resultEl.className = 'result';
        btnEl.textContent = '送出答案';
        isAnswered = false;
        answerInput.disabled = false;
        answerInput.focus();
    }

    // 檢查答案
    function checkAnswer() {
        // 如果已經回答過，此時按鈕功能是「下一題」
        if (isAnswered) {
            generateQuestion();
            return;
        }

        const userAnswer = parseInt(answerInput.value);

        // 防呆：如果沒輸入內容
        if (isNaN(userAnswer)) {
            resultEl.textContent = '請輸入答案喔！';
            resultEl.className = 'result wrong';
            return;
        }

        totalCount++;
        totalEl.textContent = totalCount;
        answerInput.disabled = true;

        if (userAnswer === correctAnswer) {
            scoreCount++;
            scoreEl.textContent = scoreCount;
            resultEl.textContent = ' 答對了！太棒了！';
            resultEl.className = 'result correct';
        } else {
            resultEl.textContent = ` 答錯了... 正確答案是 ${correctAnswer}`;
            resultEl.className = 'result wrong';
        }

        btnEl.textContent = '下一題';
        isAnswered = true;
    }

    // 支援按下 Enter 鍵送出或下一題
    answerInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            checkAnswer();
        }
    });
    
    // 支援在按鈕聚焦時按 Enter 也能作用
    btnEl.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            checkAnswer();
        }
    });

    // 初始化第一題
    generateQuestion();
</script>

</body>
</html>
