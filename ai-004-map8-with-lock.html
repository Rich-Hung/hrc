<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全螢幕地圖路徑軌跡工具 (含點擊鎖定)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body {
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 右下角懸浮控制面板 */
        .control-panel {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 290px;
        }

        .panel-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin: 0;
        }

        /* 核取方塊樣式優化 */
        .lock-switch-group {
            display: flex;
            align-items: center;
            background: #eef2f7;
            padding: 10px;
            border-radius: 8px;
            gap: 8px;
            cursor: pointer;
            border: 1px solid #dcdde1;
        }

        .lock-switch-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .lock-switch-group span {
            font-size: 13px;
            font-weight: bold;
            color: #2c3e50;
        }

        /* 距離合計欄 */
        .total-input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .total-input-group label, .route-select-group label {
            font-size: 12px;
            color: #666;
            font-weight: bold;
        }

        .total-input {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            text-align: right;
            outline: none;
        }

        /* 路線選擇選單區 */
        .route-select-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .route-dropdown {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            background-color: white;
            outline: none;
        }

        /* 按鈕群組排版 */
        .btn-group-row {
            display: flex;
            gap: 8px;
        }

        button {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-locate { background-color: #34495e; color: white; }
        .btn-add-current { background-color: #e67e22; color: white; }
        .btn-save { background-color: #2ecc71; color: white; }
        .btn-load { background-color: #4a90e2; color: white; }
        .btn-delete { background-color: #f39c12; color: white; }
        .btn-clear { background-color: #ff5e5e; color: white; margin-top: 5px; }

        /* 線條距離文字標籤樣式 */
        .distance-label {
            background: white;
            border: 1px solid #666;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 12px;
            font-weight: bold;
            color: #333;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel">
        <p class="panel-title">🗺️ 行動軌跡與測距工具</p>
        
        <label class="lock-switch-group">
            <input type="checkbox" id="enableMapClick">
            <span>👉 勾選才允許點擊地圖插旗</span>
        </label>

        <div class="btn-group-row">
            <button class="btn-locate" onclick="locateUser(true)">🎯 刷新我位置</button>
            <button class="btn-add-current" onclick="addCurrentLocationToRoute()">➕ 納入當前位置</button>
        </div>
        
        <div class="total-input-group">
            <label>總合計距離：</label>
            <input type="text" id="totalDistance" class="total-input" value="0 公尺" readonly>
        </div>

        <button class="btn-save" onclick="saveRoute()">💾 儲存目前路線與命名</button>

        <div class="route-select-group">
            <label for="routeSelect">讀取歷史路線：</label>
            <select id="routeSelect" class="route-dropdown">
                <option value="">-- 尚未儲存任何路線 --</option>
            </select>
            <div class="btn-group-row">
                <button class="btn-load" onclick="loadRoute()">📂 載入</button>
                <button class="btn-delete" onclick="deleteRoute()">🗑️ 刪除</button>
            </div>
        </div>

        <button class="btn-clear" onclick="clearMap(true)">❌ 清除當前線條圖釘</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([23.6, 121.0], 7);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const myLocationGroup = L.layerGroup().addTo(map);
        const markerGroup = L.layerGroup().addTo(map);
        const lineGroup = L.layerGroup().addTo(map);
        
        let pointsArray = []; 
        let totalDistance = 0;
        let lastUserLatLng = null;

        const redIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        const blueIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        const greenIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        document.addEventListener('DOMContentLoaded', () => {
            updateDropdown();
            locateUser(false); 
        });

        // 修改後的點擊監聽：加入核取方塊的狀態判斷
        map.on('click', function(e) {
            const isClickEnabled = document.getElementById('enableMapClick').checked;
            
            if (!isClickEnabled) {
                // 如果沒有打勾，直接攔截不執行任何動作
                return;
            }
            
            // 有打勾才允許進入原本的新增節點邏輯
            addPointToMap(e.latlng);
        });

        function addPointToMap(latlng, customPopupText = null) {
            let currentMarker;

            if (pointsArray.length === 0) {
                currentMarker = L.marker(latlng, { icon: redIcon }).addTo(markerGroup);
                currentMarker.bindPopup(customPopupText || "<b>起點 (紅色)</b>").openPopup();
            } else {
                currentMarker = L.marker(latlng, { icon: blueIcon }).addTo(markerGroup);
                
                const lastLatLng = pointsArray[pointsArray.length - 1];
                const distance = lastLatLng.distanceTo(latlng); 
                const distanceRounded = Math.round(distance);

                totalDistance += distance;
                document.getElementById('totalDistance').value = Math.round(totalDistance).toLocaleString() + " 公尺";

                L.polyline([lastLatLng, latlng], {
                    color: '#4a90e2', weight: 4, opacity: 0.8
                }).addTo(lineGroup);

                const centerLatLng = L.latLng((lastLatLng.lat + latlng.lat) / 2, (lastLatLng.lng + latlng.lng) / 2);

                L.marker(centerLatLng, {
                    icon: L.divIcon({
                        className: 'distance-label',
                        html: `${distanceRounded} m`,
                        iconAnchor: [20, 10]
                    })
                }).addTo(lineGroup);
                
                currentMarker.bindPopup(customPopupText || `距離前一站: ${distanceRounded} 公尺`).openPopup();
            }

            pointsArray.push(latlng);
        }

        function locateUser(showAlerts = false) {
            if (!navigator.geolocation) {
                if (showAlerts) alert('您的裝置不支援 GPS 定位！');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    lastUserLatLng = L.latLng(lat, lng);

                    myLocationGroup.clearLayers();
                    const myMarker = L.marker(lastUserLatLng, { icon: greenIcon })
                        .bindPopup('<b>🟢 您目前的手機位置</b>')
                        .addTo(myLocationGroup);

                    if (showAlerts) {
                        map.setView(lastUserLatLng, 16);
                        myMarker.openPopup();
                    }
                },
                function(error) {
                    console.log("定位失敗: ", error.message);
                    if (showAlerts) {
                        alert("無法取得您的即時 GPS 訊號，請確認手機設定中已允許瀏覽器定位。");
                    }
                },
                { enableHighAccuracy: true, timeout: 6000 }
            );
        }

        // 💡 提示：「➕ 納入當前位置」功能不受核取方塊限制，隨時按都可以抓取 GPS
        function addCurrentLocationToRoute() {
            if (!navigator.geolocation) {
                alert('裝置不支援 GPS 定位！');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    lastUserLatLng = L.latLng(lat, lng);

                    myLocationGroup.clearLayers();
                    L.marker(lastUserLatLng, { icon: greenIcon })
                        .bindPopup('<b>🟢 您目前的手機位置</b>')
                        .addTo(myLocationGroup);

                    const nodeIndex = pointsArray.length + 1;
                    addPointToMap(lastUserLatLng, `<b>📍 實地紀錄點 #${nodeIndex}</b>`);
                    map.setView(lastUserLatLng, 16);
                },
                function(error) {
                    alert("擷取目前位置失敗，請確認定位設定！");
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }

        function getAllSavedRoutes() {
            const routes = localStorage.getItem('multi_map_routes');
            return routes ? JSON.parse(routes) : {};
        }

        function updateDropdown() {
            const select = document.getElementById('routeSelect');
            const allRoutes = getAllSavedRoutes();
            select.innerHTML = ''; 
            const keys = Object.keys(allRoutes);
            if (keys.length === 0) {
                const opt = document.createElement('option');
                opt.value = ''; opt.textContent = '-- 尚未儲存任何路線 --';
                select.appendChild(opt);
                return;
            }
            const defaultOpt = document.createElement('option');
            defaultOpt.value = ''; defaultOpt.textContent = `-- 請選擇歷史路線 (${keys.length}條) --`;
            select.appendChild(defaultOpt);

            keys.forEach(routeName => {
                const opt = document.createElement('option');
                opt.value = routeName; opt.textContent = routeName;
                select.appendChild(opt);
            });
        }

        function saveRoute() {
            if (pointsArray.length === 0) {
                alert('地圖上沒有任何節點，無法儲存路線喔！');
                return;
            }
            let routeName = prompt('請輸入此路線的名稱：');
            if (routeName === null) return;
            routeName = routeName.trim();
            if (routeName === '') { alert('名稱不能為空喔！'); return; }

            const allRoutes = getAllSavedRoutes();
            if (allRoutes[routeName]) {
                if (!confirm(`已存在名為「${routeName}」的路線，是否要覆蓋它？`)) return;
            }

            const routeData = pointsArray.map(p => ({ lat: p.lat, lng: p.lng }));
            allRoutes[routeName] = routeData;
            localStorage.setItem('multi_map_routes', JSON.stringify(allRoutes));
            alert(`💾 路線「${routeName}」已成功儲存！`);
            updateDropdown();
        }

        function loadRoute() {
            const select = document.getElementById('routeSelect');
            const selectedName = select.value;
            if (!selectedName) { alert('請先在下拉選單中選擇一條歷史路線喔！'); return; }
            if (pointsArray.length > 0) {
                if (!confirm('讀取歷史路線會清除目前地圖上的暫存資料，確定嗎？')) return;
            }

            clearMap(false); 

            const allRoutes = getAllSavedRoutes();
            const routeData = allRoutes[selectedName];
            if (routeData) {
                routeData.forEach(coord => {
                    addPointToMap(L.latLng(coord.lat, coord.lng));
                });
                if (pointsArray.length > 0) {
                    map.fitBounds(L.latLngBounds(pointsArray), { padding: [50, 50] }); 
                }
            }
        }

        function deleteRoute() {
            const select = document.getElementById('routeSelect');
            const selectedName = select.value;
            if (!selectedName) { alert('請先在下拉選單中選擇您想刪除的路線！'); return; }
            if (confirm(`🗑️ 確定要永久刪除「${selectedName}」這條路線嗎？`)) {
                const allRoutes = getAllSavedRoutes();
                delete allRoutes[selectedName];
                localStorage.setItem('multi_map_routes', JSON.stringify(allRoutes));
                alert(`已刪除「${selectedName}」。`);
                updateDropdown();
            }
        }

        function clearMap(isManual) {
            if (isManual && pointsArray.length === 0) {
                alert('畫面目前已經是空的囉！');
                return;
            }
            if (!isManual || confirm('確定要清空當前畫面的軌跡嗎？（安全紀錄將安全保留）')) {
                markerGroup.clearLayers();  
                lineGroup.clearLayers();    
                pointsArray = [];           
                totalDistance = 0;          
                document.getElementById('totalDistance').value = "0 公尺"; 
            }
        }
    </script>
</body>
</html>
