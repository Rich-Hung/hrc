<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全螢幕雲端地圖軌跡工具</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { padding: 0; margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        #map { width: 100%; height: 100%; z-index: 1; }
        .control-panel {
            position: absolute; bottom: 30px; right: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15); display: flex; flex-direction: column; gap: 10px; width: 290px;
        }
        .panel-title { font-size: 14px; font-weight: bold; color: #333; margin: 0; }
        .total-input-group label { font-size: 12px; color: #666; font-weight: bold; }
        .total-input { width: 100%; padding: 10px; font-size: 18px; font-weight: bold; background: #f8f9fa; border: 2px solid #e0e0e0; border-radius: 8px; text-align: right; }
        .btn-group-row { display: flex; gap: 8px; }
        button { width: 100%; padding: 11px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: transform 0.1s; color: white;}
        button:active { transform: scale(0.98); }
        .btn-auth { background-color: #4285F4; }
        .btn-locate { background-color: #34495e; }
        .btn-add-current { background-color: #e67e22; }
        .btn-save { background-color: #2ecc71; }
        .btn-load { background-color: #4a90e2; }
        .btn-clear { background-color: #ff5e5e; margin-top: 5px; }
        .distance-label { background: white; border: 1px solid #666; border-radius: 4px; padding: 2px 6px; font-size: 12px; font-weight: bold; }
        select { width: 100%; padding: 10px; font-size: 14px; border-radius: 8px; border: 2px solid #e0e0e0; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel">
        <p class="panel-title">☁️ 雲端軌跡測距工具</p>
        
        <button id="authorize_button" class="btn-auth" onclick="handleAuthClick()">登入 Google 雲端讀取資料</button>
        <button id="signout_button" class="btn-clear" onclick="handleSignoutClick()" style="display: none;">登出 Google</button>

        <label style="font-size: 13px; font-weight: bold; display: flex; gap: 5px; align-items: center;">
            <input type="checkbox" id="enableMapClick"> 勾選才允許點擊插旗
        </label>

        <div class="btn-group-row">
            <button class="btn-locate" onclick="locateUser(true)">🎯 刷新位置</button>
            <button class="btn-add-current" onclick="addCurrentLocationToRoute()">➕ 納入當前</button>
        </div>
        
        <div class="total-input-group">
            <label>總合計距離：</label>
            <input type="text" id="totalDistance" class="total-input" value="0 公尺" readonly>
        </div>

        <button class="btn-save" onclick="saveRouteToDrive()">💾 同步目前路線至雲端</button>

        <div style="border-top: 1px solid #eee; padding-top: 10px; display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 12px; color: #666; font-weight: bold;">讀取雲端歷史路線：</label>
            <select id="routeSelect"><option value="">-- 請先登入 --</option></select>
            <button class="btn-load" onclick="loadRouteFromSelect()">📂 載入所選路線</button>
        </div>

        <button class="btn-clear" onclick="clearMap(true)">❌ 清除當前線條圖釘</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        /* ========================================================
           請在這裡填入您申請的 Google Cloud 憑證
           ======================================================== */
        //const CLIENT_ID = '請填入您的_CLIENT_ID.apps.googleusercontent.com';
        //const API_KEY = '請填入您的_API_KEY';
	//2027-0627於GoogleCloud網站申請
        const CLIENT_ID = '27889885944-73loidqbuu79h114sbrph9uacoh0gf9b.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyDRqTasSci6doMpi6lLSHrJ_R7oNhp9kyo';
        
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file'; // 只允許讀寫由此應用程式建立的檔案
        const FILE_NAME = 'map_routes_data.json';

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        let driveFileId = null; // 暫存雲端硬碟中的檔案 ID
        let cloudRoutesData = {}; // 暫存從雲端拉下來的路線資料

        // --- Google API 授權流程 ---
        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }
        async function initializeGapiClient() {
            await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
            gapiInited = true;
            maybeEnableButtons();
        }
        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', // 在點擊事件中定義
            });
            gisInited = true;
            maybeEnableButtons();
        }
        function maybeEnableButtons() {
            if (gapiInited && gisInited) {
                document.getElementById('authorize_button').innerText = "點此登入 Google 同步";
            }
        }
        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) throw (resp);
                document.getElementById('authorize_button').style.display = 'none';
                document.getElementById('signout_button').style.display = 'block';
                await fetchCloudData(); // 登入成功後立刻去雲端找資料
            };
            if (gapi.client.getToken() === null) {
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                tokenClient.requestAccessToken({prompt: ''});
            }
        }
        function handleSignoutClick() {
            const token = gapi.client.getToken();
            if (token !== null) google.accounts.oauth2.revoke(token.access_token);
            gapi.client.setToken('');
            document.getElementById('authorize_button').style.display = 'block';
            document.getElementById('signout_button').style.display = 'none';
            document.getElementById('routeSelect').innerHTML = '<option value="">-- 請先登入 --</option>';
            cloudRoutesData = {};
        }

        // --- 雲端硬碟存取核心邏輯 ---
        async function fetchCloudData() {
            try {
                // 1. 搜尋雲端硬碟中是否已經有 map_routes_data.json
                let response = await gapi.client.drive.files.list({
                    q: `name='${FILE_NAME}' and trashed=false`,
                    fields: 'files(id, name)',
                    spaces: 'drive'
                });
                const files = response.result.files;
                
                if (files && files.length > 0) {
                    driveFileId = files[0].id;
                    // 2. 下載檔案內容
                    let fileRes = await gapi.client.drive.files.get({
                        fileId: driveFileId,
                        alt: 'media'
                    });
                    cloudRoutesData = fileRes.result || {};
                } else {
                    // 沒有檔案就預設為空物件
                    cloudRoutesData = {};
                }
                updateDropdownUI();
                alert('✅ 雲端資料同步完成！');
            } catch (err) {
                console.error(err);
                alert('讀取雲端資料失敗，請檢查 API 設定。');
            }
        }

        async function saveRouteToDrive() {
            if (!gapi.client.getToken()) { alert('請先登入 Google！'); return; }
            if (pointsArray.length === 0) { alert('地圖上沒有節點可儲存！'); return; }

            let routeName = prompt('請輸入此路線名稱：');
            if (!routeName) return;
            routeName = routeName.trim();

            // 更新本機暫存資料
            cloudRoutesData[routeName] = pointsArray.map(p => ({ lat: p.lat, lng: p.lng }));
            const jsonString = JSON.stringify(cloudRoutesData);
            const fileContent = new Blob([jsonString], {type: 'application/json'});
            const metadata = { name: FILE_NAME, mimeType: 'application/json' };

            let form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', fileContent);

            try {
                if (driveFileId) {
                    // 檔案已存在：更新檔案 (PATCH)
                    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`, {
                        method: 'PATCH',
                        headers: new Headers({ 'Authorization': 'Bearer ' + gapi.client.getToken().access_token }),
                        body: form
                    });
                } else {
                    // 檔案不存在：建立新檔案 (POST)
                    let res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                        method: 'POST',
                        headers: new Headers({ 'Authorization': 'Bearer ' + gapi.client.getToken().access_token }),
                        body: form
                    });
                    let data = await res.json();
                    driveFileId = data.id;
                }
                alert(`☁️ 路線「${routeName}」已成功存入雲端硬碟！`);
                updateDropdownUI();
            } catch (err) {
                console.error(err);
                alert('上傳至雲端失敗。');
            }
        }

        function updateDropdownUI() {
            const select = document.getElementById('routeSelect');
            select.innerHTML = ''; 
            const keys = Object.keys(cloudRoutesData);
            if (keys.length === 0) {
                select.innerHTML = '<option value="">-- 雲端尚無路線 --</option>';
                return;
            }
            select.innerHTML = `<option value="">-- 選擇雲端路線 (${keys.length}條) --</option>`;
            keys.forEach(k => {
                let opt = document.createElement('option');
                opt.value = k; opt.textContent = k;
                select.appendChild(opt);
            });
        }

        function loadRouteFromSelect() {
            const name = document.getElementById('routeSelect').value;
            if (!name) return;
            if (pointsArray.length > 0 && !confirm('讀取會清除畫面，確定嗎？')) return;
            
            clearMap(false);
            const route = cloudRoutesData[name];
            if (route) {
                route.forEach(c => addPointToMap(L.latLng(c.lat, c.lng)));
                map.fitBounds(L.latLngBounds(pointsArray), { padding: [50, 50] }); 
            }
        }

        // =======================================================
        // 以下為 Leaflet 地圖、定位與繪圖核心（維持原邏輯）
        // =======================================================
        const map = L.map('map').setView([23.6, 121.0], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const myLocationGroup = L.layerGroup().addTo(map);
        const markerGroup = L.layerGroup().addTo(map);
        const lineGroup = L.layerGroup().addTo(map);
        
        let pointsArray = []; let totalDistance = 0; let lastUserLatLng = null;

        const iconConfig = { shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] };
        const redIcon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', ...iconConfig });
        const blueIcon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png', ...iconConfig });
        const greenIcon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', ...iconConfig });

        map.on('click', e => {
            if (document.getElementById('enableMapClick').checked) addPointToMap(e.latlng);
        });

        function addPointToMap(latlng) {
            let mk = L.marker(latlng, { icon: pointsArray.length === 0 ? redIcon : blueIcon }).addTo(markerGroup);
            if (pointsArray.length > 0) {
                const last = pointsArray[pointsArray.length - 1];
                const dist = Math.round(last.distanceTo(latlng));
                totalDistance += dist;
                document.getElementById('totalDistance').value = totalDistance.toLocaleString() + " 公尺";
                L.polyline([last, latlng], { color: '#4a90e2', weight: 4 }).addTo(lineGroup);
                mk.bindPopup(`距離前站: ${dist} 公尺`).openPopup();
            } else {
                mk.bindPopup("<b>起點</b>").openPopup();
            }
            pointsArray.push(latlng);
        }

        function locateUser(showAlerts) {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(
                pos => {
                    lastUserLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
                    myLocationGroup.clearLayers();
                    L.marker(lastUserLatLng, { icon: greenIcon }).bindPopup('<b>🟢 您的位置</b>').addTo(myLocationGroup);
                    if (showAlerts) map.setView(lastUserLatLng, 16);
                },
                err => { if(showAlerts) alert("定位失敗，請檢查權限。"); },
                { enableHighAccuracy: true, timeout: 6000 }
            );
        }

        function addCurrentLocationToRoute() {
            if (!lastUserLatLng) { alert("請先點擊刷新位置！"); return; }
            addPointToMap(lastUserLatLng);
            map.setView(lastUserLatLng, 16);
        }

        function clearMap(isManual) {
            if (isManual && pointsArray.length === 0) return;
            markerGroup.clearLayers(); lineGroup.clearLayers();
            pointsArray = []; totalDistance = 0;
            document.getElementById('totalDistance').value = "0 公尺"; 
        }

        // 開啟時自動取得一次位置
        document.addEventListener('DOMContentLoaded', () => locateUser(false));
    </script>
</body>
</html>
